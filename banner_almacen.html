
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Técnicas de almacén – Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F06B6B;font-family:'Fira Sans',Arial,sans-serif;min-height:100vh;}
body{padding:18px 20px 28px;}
.fe{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.ei{position:absolute;opacity:0.12;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(110%);opacity:0;}8%{opacity:0.12;}90%{opacity:0.12;}100%{transform:translateY(-10%);opacity:0;}}
.mtag{display:inline-block;background:#C4F135;color:#1a1a1a;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:3px 11px;border-radius:4px;margin-bottom:10px;}
.btitle{font-family:'Fira Sans',sans-serif;font-weight:900;font-size:36px;color:#fff;line-height:1.05;margin-bottom:3px;}
.bsub{font-family:'Fira Sans',sans-serif;font-size:13px;font-style:italic;color:rgba(255,255,255,.6);margin-bottom:16px;font-weight:400;}
.two-col{display:flex;gap:10px;align-items:stretch;}
.racha-block{background:rgba(0,0,0,.18);border-radius:10px;padding:14px 10px;width:128px;min-width:128px;text-align:center;flex-shrink:0;}
.rl{font-family:'Fira Sans',sans-serif;font-size:9px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.rn{font-family:'Fira Sans',sans-serif;font-weight:900;font-size:50px;color:#C4F135;line-height:1;}
.rn.bump{animation:bump .35s ease;}
@keyframes bump{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.rf{font-size:18px;margin:3px 0 2px;}
.rm{font-family:'Fira Sans',sans-serif;font-size:10px;color:rgba(255,255,255,.8);font-style:italic;line-height:1.3;margin-top:4px;}
.rb{font-family:'Fira Sans',sans-serif;font-size:9px;color:rgba(196,241,53,.75);margin-top:4px;}
.rshield{font-family:'Fira Sans',sans-serif;font-size:9px;color:#fff;background:rgba(196,241,53,.25);border:1px solid rgba(196,241,53,.5);border-radius:4px;padding:2px 6px;margin-top:5px;display:none;}
.rshield.active{display:block;}
.q-block{background:rgba(0,0,0,.16);border-radius:10px;padding:13px;flex:1;min-width:0;display:flex;flex-direction:column;}
.qhook{font-family:'Fira Sans',sans-serif;font-size:9px;font-weight:700;color:#C4F135;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.qtxt{font-family:'Fira Sans',sans-serif;font-size:12px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:8px;}
.qopts{display:flex;flex-direction:column;gap:4px;flex:1;}
.qopt{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 9px;font-size:11px;font-family:'Fira Sans',sans-serif;color:#fff;cursor:pointer;text-align:left;line-height:1.3;transition:background .15s;}
.qopt:hover:not([disabled]){background:rgba(255,255,255,.22);}
.qopt.correct{background:rgba(196,241,53,.28);border-color:#C4F135;font-weight:700;color:#C4F135;}
.qopt.wrong{background:rgba(255,80,80,.28);border-color:rgba(255,120,120,.7);color:#ffc0c0;}
.qopt.shielded{background:rgba(255,200,0,.2);border-color:rgba(255,200,0,.6);color:#ffe580;}
.qopt[disabled]{cursor:default;}
.qfact{font-family:'Fira Sans',sans-serif;font-size:10px;color:rgba(255,255,255,.7);font-style:italic;margin-top:6px;line-height:1.4;display:none;}
.qnext{background:#C4F135;color:#1a1a1a;border:none;border-radius:6px;padding:5px 12px;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin-top:6px;display:none;align-self:flex-start;}
.dchips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.dchip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:99px;padding:3px 9px;font-size:10px;font-family:'Fira Sans',sans-serif;color:#fff;cursor:pointer;line-height:1.4;transition:background .15s;}
.dchip:hover:not(.used){background:rgba(255,255,255,.25);}
.dchip.used{opacity:.3;cursor:default;}
.dchip.selected{background:rgba(196,241,53,.35);border-color:#C4F135;color:#C4F135;}
.dslots{display:flex;flex-direction:column;gap:3px;margin-bottom:5px;}
.dslot{background:rgba(0,0,0,.15);border:1.5px dashed rgba(255,255,255,.3);border-radius:6px;padding:4px 9px;font-size:10px;font-family:'Fira Sans',sans-serif;color:rgba(255,255,255,.45);min-height:26px;display:flex;align-items:center;gap:5px;cursor:pointer;}
.dslot.filled{border-style:solid;border-color:rgba(255,255,255,.5);color:#fff;}
.dslot.correct-s{border-color:#C4F135;background:rgba(196,241,53,.15);color:#C4F135;}
.dslot.wrong-s{border-color:rgba(255,100,100,.7);background:rgba(255,80,80,.15);color:#ffc0c0;}
.slot-lbl{color:rgba(255,255,255,.4);font-size:9px;flex-shrink:0;}
.qbtn{background:#C4F135;color:#1a1a1a;border:none;border-radius:6px;padding:5px 12px;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin-top:5px;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.pb{background:#C4F135;border-radius:12px;padding:20px 22px;text-align:center;max-width:280px;width:90%;position:relative;}
.pe{font-size:36px;margin-bottom:6px;}
.pt{font-family:'Fira Sans',sans-serif;font-weight:900;font-size:16px;color:#1a1a1a;margin-bottom:5px;}
.pd{font-family:'Fira Sans',sans-serif;font-size:11px;color:#333;line-height:1.45;margin-bottom:12px;}
.pc{background:#1a1a1a;color:#C4F135;border:none;border-radius:7px;padding:7px 18px;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.cf{position:absolute;border-radius:2px;animation:cfall 1.3s ease-in forwards;}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(160px) rotate(400deg);opacity:0;}}
</style>
</head>
<body>
<div class="fe" id="el"></div>
<div style="position:relative;z-index:2;">
  <div class="mtag">FP Comercio y Marketing</div>
  <div class="btitle">Técnicas de almacén</div>
  <div class="bsub">Aprendemos haciendo</div>
  <div class="two-col">
    <div class="racha-block">
      <div class="rl">Racha sin fallos</div>
      <div class="rn" id="rn">0</div>
      <div class="rf" id="rf">⚡</div>
      <div class="rm" id="rm">¡Empieza hoy!</div>
      <div class="rb" id="rb"></div>
      <div class="rshield" id="rshield">🛡️ Escudo activo</div>
    </div>
    <div class="q-block" id="qb">
      <div class="qtxt" style="color:rgba(255,255,255,.4)">Cargando...</div>
    </div>
  </div>
</div>
<div class="ov" id="ov">
  <div class="pb" id="pbox">
    <div class="pe" id="pe">🏆</div>
    <div class="pt" id="pt">¡Correcto!</div>
    <div class="pd" id="pd"></div>
    <button class="pc" onclick="closeP()">Seguir →</button>
  </div>
</div>
<script>
var QS=[
{t:'mc',h:'¿Sabías que...',q:'¿Qué significa FIFO en gestión de almacén?',o:['First In First Out','Fast Inventory Flow Order','Full Item Final Output','Fixed Index For Orders'],a:0,f:'Lo primero que entra es lo primero que sale. Esencial en productos con caducidad.'},
{t:'mc',h:'¿Cuál crees que es...', q:'¿Cuál es la unidad de medida de los contenedores marítimos?',o:['TEU (Twenty-foot Equivalent Unit)','CEU (Container Equivalent Unit)','PEU (Port Entry Unit)','MEU (Maritime Export Unit)'],a:0,f:'Hay más de 800 millones de movimientos TEU anuales en todo el mundo.'},
{t:'mc',h:'¡Adivina si puedes!',q:'¿Qué porcentaje del precio final puede representar el coste logístico?',o:['Entre el 5% y el 15%','Menos del 1%','Siempre el 20% exacto','Entre el 50% y el 70%'],a:0,f:'En alimentación fresca puede llegar hasta el 25-30% del precio final.'},
{t:'mc',h:'¿Sabías que...',q:'Los primeros 3 dígitos del código EAN-13 identifican:',o:['El país del fabricante','El precio del producto','La fecha de fabricación','La categoría del artículo'],a:0,f:'España usa el prefijo 84. Puedes saber el origen de cualquier producto mirando el EAN.'},
{t:'mc',h:'¿Te lo imaginas?',q:'¿Cuántos km puede caminar al día un operario en un almacén grande?',o:['Entre 15 y 25 km','Menos de 3 km','Entre 5 y 8 km','Más de 50 km'],a:0,f:'Por eso el diseño de rutas de picking es crucial para reducir fatiga y tiempo.'},
{t:'mc',h:'¡Pon a prueba tu criterio!',q:'¿Qué es el efecto látigo en logística?',o:['Amplificación de variaciones de demanda en la cadena','Un tipo de transporte especial','Oscilación de precios en Bolsa','Fallo mecánico en carretillas'],a:0,f:'Una pequeña variación en demanda final puede multiplicarse x10 en los proveedores.'},
{t:'mc',h:'¿Cuántos caben?',q:'¿Cuántos palets EUR caben en un camión tráiler de 13,6 m?',o:['33 palets','20 palets','50 palets','15 palets'],a:0,f:'El palet europeo (1200x800mm) está diseñado exactamente para optimizar este espacio.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué es un almacén caótico?',o:['Mercancía sin ubicación fija, gestionada por software','Un almacén sin gestión visible','Un almacén de residuos','Un almacén en obras'],a:0,f:'El software sabe siempre dónde está cada artículo aunque cambie de ubicación.'},
{t:'mc',h:'¡Decide como un profesional!',q:'¿Qué sistema de picking tiene menor tasa de error?',o:['Picking por voz','Picking en papel','Picking por memoria','Picking por SMS'],a:0,f:'El picking por voz puede alcanzar 99,9% de precisión y libera las manos del operario.'},
{t:'mc',h:'¿Lo sabías?',q:'¿Quién usa más el cross-docking en España?',o:['Supermercados y distribución de alimentación','Librerías y papelerías','Ferreterías industriales','Tiendas de lujo'],a:0,f:'Mercadona y Lidl son referentes en cross-docking para mercancía fresca.'},
{t:'mc',h:'¿Cuál crees?',q:'¿Qué significa SKU en gestión de almacén?',o:['Stock Keeping Unit','Stock Kilómetro Útil','Sistema de Kardex Universal','Servicio de Kitting Unificado'],a:0,f:'Cada variante de producto (talla, color, modelo) tiene su propio SKU único.'},
{t:'mc',h:'¡Sorpréndete!',q:'¿Cuántos robots tiene Amazon en sus almacenes?',o:['Más de 750.000 (Amazon Robotics)','Unos 10.000','50.000 FulfillBot','Solo 5.000 en EE.UU.'],a:0,f:'Amazon adquirió Kiva Systems en 2012 por 775 millones de dólares solo por su tecnología.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué norma regula el transporte de mercancías peligrosas por carretera?',o:['ADR','IATA','CMR','FIATA'],a:0,f:'ADR: Acuerdo Europeo sobre Transporte Internacional de Mercancías Peligrosas por Carretera.'},
{t:'mc',h:'¿Qué harías tú?',q:'Llega una mercancía dañada al almacén. ¿Qué haces primero?',o:['Anotar reserva en el albarán y fotografiar el daño','Aceptarla y reclamar después','Rechazarla sin documentar nada','Llamar al jefe antes de hacer nada'],a:0,f:'Sin reserva en el albarán es muy difícil reclamar al transportista después.'},
{t:'mc',h:'¡Decide!',q:'¿Qué modelo de inventario usa cantidad fija de pedido?',o:['Modelo Q (punto de pedido fijo)','Modelo P (revisión periódica)','Modelo LIFO','Modelo ABC'],a:0,f:'El modelo Q lanza un pedido siempre de la misma cantidad cuando el stock baja del punto de pedido.'},
{t:'mc',h:'¿Sabías que...',q:'El método ABC clasifica los artículos por:',o:['Valor económico que representan','Peso y volumen','Fecha de caducidad','Proveedor de origen'],a:0,f:'El 20% de los artículos tipo A suele representar el 80% del valor total del inventario.'},
{t:'mc',h:'¿Cuál crees?',q:'¿Qué es el stock de seguridad?',o:['Reserva para cubrir variaciones de demanda o retrasos','El stock mínimo legal','El inventario físico anual','Stock guardado para inspecciones'],a:0,f:'Sin stock de seguridad, cualquier retraso del proveedor puede paralizar las ventas.'},
{t:'mc',h:'¡Ponlo a prueba!',q:'¿Qué EPI es obligatorio en zonas con carretillas elevadoras?',o:['Calzado de seguridad y casco','Solo guantes','Solo chaleco reflectante','Ninguno si hay señalización'],a:0,f:'La normativa PRL exige calzado de seguridad y casco en zonas con riesgo de caída de objetos.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué es un WMS?',o:['Warehouse Management System','Wireless Merchandise Scanner','Weekly Management Summary','Work Machine Station'],a:0,f:'Un WMS controla ubicaciones, movimientos, picking y expedición en tiempo real.'},
{t:'mc',h:'¡Dato curioso!',q:'¿Cuál es la temperatura mínima de almacenamiento de productos ultracongelados?',o:['-18°C o inferior','-5°C','+2°C a +5°C','0°C exacto'],a:0,f:'Por ley deben mantenerse a -18°C o menos durante toda la cadena de frío.'},
{t:'mc',h:'¿Lo sabías?',q:'¿Qué significa punto de pedido en gestión de stocks?',o:['Nivel de stock que activa un nuevo pedido','El precio mínimo de compra','La cantidad máxima almacenable','El plazo de entrega del proveedor'],a:0,f:'Se calcula teniendo en cuenta el consumo medio y el plazo de entrega del proveedor.'},
{t:'mc',h:'¡Decide como un jefe!',q:'¿Qué documento acredita la entrega de mercancía?',o:['Albarán de entrega firmado','Factura proforma','Nota de cargo','Pedido de compra'],a:0,f:'El albarán firmado es la prueba legal de que la mercancía fue recibida en las condiciones pactadas.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué significa LIFO en valoración de existencias?',o:['Last In First Out','Last Item For Order','Low Inventory Fixed Output','Logistics Index For Operations'],a:0,f:'LIFO ya no está permitido en España según el Plan General Contable vigente.'},
{t:'mc',h:'¿Cuál es más eficiente?',q:'¿Qué layout de almacén facilita más el flujo de mercancías?',o:['Flujo en línea recta (entrada y salida opuestas)','Flujo en U (entrada y salida juntas)','Flujo en zigzag','Flujo circular'],a:0,f:'El flujo en línea recta es ideal para cross-docking. El flujo en U es más habitual en almacenes polivalentes.'},
{t:'mc',h:'¡Dato que no esperabas!',q:'¿Cuánto puede pesar como máximo una carga manual sin ayuda mecánica?',o:['25 kg en condiciones óptimas','50 kg','10 kg','No hay límite legal'],a:0,f:'Para mujeres embarazadas o jóvenes el límite baja a 10-15 kg.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué es el picking por oleadas?',o:['Agrupar pedidos por zonas o turnos para optimizar rutas','Hacer picking en zonas refrigeradas','Seleccionar productos de alta rotación primero','Recoger artículos siguiendo el orden del EAN'],a:0,f:'Las oleadas reducen los km recorridos y permiten preparar muchos pedidos a la vez.'},
{t:'mc',h:'¿Cuál crees?',q:'¿Qué color de señal indica PROHIBICIÓN en seguridad laboral?',o:['Rojo y blanco','Amarillo y negro','Verde y blanco','Azul y blanco'],a:0,f:'Rojo=prohibición. Amarillo=advertencia. Verde=evacuación. Azul=obligación.'},
{t:'mc',h:'¡Ponlo a prueba!',q:'En un inventario, ¿qué es la diferencia de inventario?',o:['Diferencia entre stock teórico y stock real','El tiempo entre dos inventarios','El coste de hacer el recuento','El número de referencias contadas'],a:0,f:'Las mermas, robos y errores de registro son las principales causas de diferencias de inventario.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué es el lote económico de pedido EOQ?',o:['Cantidad que minimiza costes de pedido y almacenamiento','El lote mínimo del proveedor','La cantidad máxima que cabe en el almacén','El pedido de emergencia'],a:0,f:'La fórmula EOQ fue desarrollada por Ford Harris en 1913 y sigue usándose hoy.'},
{t:'mc',h:'¡Decide!',q:'¿Qué carretilla se usa en pasillos muy estrechos?',o:['Carretilla retráctil o tridireccional','Carretilla frontal estándar','Transpaleta manual','Apilador eléctrico de pie'],a:0,f:'Las carretillas trilaterales pueden trabajar en pasillos de tan solo 1,6 m de ancho.'},
{t:'mc',h:'¿Cuál crees que...',q:'¿Qué es el lead time o plazo de entrega?',o:['Tiempo desde el pedido hasta que llega al almacén','El plazo de pago al proveedor','El tiempo de descarga de un camión','El plazo de garantía del producto'],a:0,f:'Un lead time largo obliga a tener más stock de seguridad para no quedarse sin existencias.'},
{t:'mc',h:'¿Lo sabías?',q:'¿Qué es la trazabilidad de un producto?',o:['Seguimiento a lo largo de toda la cadena de suministro','El peso total de una remesa','La ruta del camión de reparto','El número de albaranes generados'],a:0,f:'Obligatoria en alimentación desde el Reglamento CE 178/2002.'},
{t:'mc',h:'¡Sorpréndete!',q:'¿Cuántos tipos de señales de seguridad hay en la normativa española?',o:['4 tipos (prohibición, advertencia, obligación, emergencia)','2 tipos','6 tipos','Solo 1 tipo normalizado'],a:0,f:'Regulados por el RD 485/1997 sobre señalización de seguridad en el trabajo.'},
{t:'mc',h:'¿Cuál elegirías?',q:'Para artículos tipo A (alta rotación), ¿dónde los ubicarías?',o:['Cerca de las zonas de picking y expedición','Al fondo del almacén','En las zonas más altas de las estanterías','Junto a la entrada de proveedores'],a:0,f:'Reducir desplazamientos de los productos más movidos puede ahorrar hasta un 30% del tiempo.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué es el picking por voz?',o:['Sistema que guía al operario mediante instrucciones de audio','Una app para hablar con el proveedor','Un sistema de grabación de incidencias','Una técnica de negociación'],a:0,f:'Se puede combinar con gafas de realidad aumentada para maximizar la precisión.'},
{t:'mc',h:'¡Ponlo a prueba!',q:'¿Qué es la hoja de ruta en expedición?',o:['Documento con las paradas y entregas del transporte','El mapa del almacén','El plan de formación del personal','El registro de incidencias del día'],a:0,f:'La hoja de ruta optimizada reduce km, tiempo y costes de combustible del transportista.'},
{t:'mc',h:'¿Cuál crees?',q:'¿Qué es la merma en gestión de almacén?',o:['Pérdida de existencias por rotura, caducidad o robo','El exceso de stock sin vender','El descuento por volumen de compra','La diferencia entre precio de compra y venta'],a:0,f:'Las mermas pueden representar entre el 1% y el 3% de las ventas en supermercados.'},
{t:'mc',h:'¿Lo sabías?',q:'¿Cuál es el objetivo del inventario rotativo?',o:['Contar partes del almacén continuamente sin parar la operativa','Hacer un recuento total una vez al año','Inventariar solo los productos tipo A','Contar el stock los fines de semana'],a:0,f:'El inventario rotativo detecta errores antes de que se acumulen y afecten a los pedidos.'},
{t:'mc',h:'¡Dato que no esperabas!',q:'¿Qué es la cadena de frío?',o:['Control continuo de temperatura desde origen hasta destino','El transporte refrigerado de corta distancia','El almacenamiento de productos congelados','La normativa de transporte nocturno'],a:0,f:'Romper la cadena de frío aunque sea una hora puede inutilizar un cargamento farmacéutico entero.'},
{t:'mc',h:'¿Cuál crees que...',q:'¿Qué es el RFID en logística?',o:['Tecnología de identificación por radiofrecuencia sin contacto','Un tipo de código de barras','Un sistema GPS para camiones','Un protocolo wifi'],a:0,f:'Un lector RFID puede identificar miles de artículos por segundo sin línea de visión directa.'},
{t:'mc',h:'¡Dato curioso!',q:'¿Cuánto puede costar un error de picking en e-commerce?',o:['Entre 15€ y 50€ incluyendo devolución y reenvío','Solo el coste del producto','Menos de 2€ de media','Más de 500€ siempre'],a:0,f:'Un 1% de errores en 10.000 pedidos/día = 100 problemas diarios. La precisión es crítica.'},
{t:'mc',h:'¿Sabías que...',q:'¿Qué es el reaprovisionamiento automático?',o:['Sistema que lanza pedidos al bajar del punto de pedido','Reponer estanterías cada día manualmente','Pedir siempre la misma cantidad cada semana','Abastecimiento sin pedido previo'],a:0,f:'Los sistemas automáticos pueden reducir las roturas de stock un 40-60%.'},
{t:'mc',h:'¡Decide como un profesional!',q:'¿Qué acción reduce más el riesgo de accidente con carretilla?',o:['Separar físicamente zonas de peatones y carretillas','Limitar la velocidad a 20 km/h','Usar carretillas de color llamativo','Colocar espejos en los pasillos'],a:0,f:'La separación física con barreras es 10 veces más eficaz que las señales horizontales.'},
{t:'mc',h:'¿Lo sabías?',q:'¿Qué es el código QR en logística?',o:['Código 2D que almacena mucha más info que un código de barras','Un tipo de etiqueta RFID','El código del transportista','Un sistema de tracking GPS'],a:0,f:'Un código QR puede almacenar hasta 7.000 caracteres. Un EAN-13 solo 13 dígitos.'},
{t:'mc',h:'¿Cuál crees?',q:'¿Qué es el mapa de calor en un almacén?',o:['Representación visual de las zonas con más actividad','Un sistema de detección de incendios','El plano de instalaciones eléctricas','El registro de temperaturas de la cámara'],a:0,f:'Los mapas de calor ayudan a rediseñar la distribución del almacén para minimizar desplazamientos.'},

// Semilla aleatoria basada en el día para que la pregunta cambie cada día pero sea la misma para todos
function seededRand(seed){
  var x=Math.sin(seed+1)*10000;
  return x-Math.floor(x);
}
function shuffleSeeded(arr, seed){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(seededRand(seed+i)*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}

var MOTS=[[0,'¡Empieza tu racha hoy!'],[1,'¡Primera correcta! Sigue así 💪'],[2,'¡Racha de 2! Calentando motores...'],[3,'¡3 seguidas! Ya te lo estás currando 🔥'],[5,'¡5 seguidas! Huele a profesional 💥'],[7,'¡Imparable! 7 sin fallar 🌟'],[10,'¡10 SEGUIDAS! Eres un crack 🏆'],[15,'¡15! Podrías dar tú la clase 👑'],[20,'¡20 SIN FALLO! Leyenda del almacén 🥇'],[999,'¡Racha brutal! Nadie llega tan lejos 🚀']];
var PRIZES=[{e:'📦',t:'¡Artículo bien ubicado!'},{e:'🏷️',t:'¡SKU verificado!'},{e:'✅',t:'¡Picking sin errores!'},{e:'🚛',t:'¡Expedición aprobada!'},{e:'🔥',t:'¡Racha en marcha!'},{e:'🌟',t:'¡Top operario!'},{e:'🏆',t:'¡Profesional en formación!'},{e:'💥',t:'¡Correcto!'}];
var EMOJIS=['📦','🏭','🚛','📋','🔍','🏷️','🪣','📊','⚙️','🔧','📬','🗂️'];

function gToday(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function gDay(){return Math.floor((new Date()-new Date(2024,8,1))/86400000);}

var streak=0,best=0,atd=false,savedAns=-1,shield=0;
try{
  streak=parseInt(localStorage.getItem("alm_s")||"0");
  best=parseInt(localStorage.getItem("alm_b")||"0");
  shield=parseInt(localStorage.getItem("alm_shield")||"0");
  atd=localStorage.getItem("alm_atd")===gToday();
  savedAns=atd?parseInt(localStorage.getItem("alm_ans")||"-1"):-1;
}catch(e){}

function save(ans){
  try{
    localStorage.setItem("alm_s",streak);
    localStorage.setItem("alm_b",best);
    localStorage.setItem("alm_atd",gToday());
    localStorage.setItem("alm_shield",shield);
    if(ans!==undefined)localStorage.setItem("alm_ans",ans);
  }catch(e){}
}

function getMot(n){var m=MOTS[0][1];for(var i=0;i<MOTS.length;i++){if(n>=MOTS[i][0])m=MOTS[i][1];}return m;}
function getFire(n){if(n===0)return'⚡';if(n<3)return'🔥';if(n<7)return'💥';if(n<10)return'🌟';if(n<15)return'🏆';return'👑';}

function updUI(){
  var rn=document.getElementById('rn');
  rn.textContent=streak;rn.className='rn bump';
  setTimeout(function(){rn.className='rn';},400);
  document.getElementById('rf').textContent=getFire(streak);
  document.getElementById('rm').textContent=getMot(streak);
  document.getElementById('rb').textContent=best>0?'Récord: '+best:'';
  var sh=document.getElementById('rshield');
  if(shield>0){sh.textContent='🛡️ Escudo x'+shield;sh.className='rshield active';}
  else{sh.className='rshield';}
}

var cQ=null,cQShuffled=null,selId=null,selTxt=null,slots=[];

// Devuelve la pregunta del día con opciones barajadas usando semilla del día
function getDayQuestion(){
  var day=gDay();
  var qIdx=day % QS.length;
  var q=QS[qIdx];
  if(q.t!=='mc') return {q:q, shuffled:null, correctShuffledIdx:-1};
  // Barajar opciones con semilla del día
  var indices=[0,1,2,3].slice(0,q.o.length);
  var shuffledIdx=shuffleSeeded(indices, day*100);
  var newOpts=shuffledIdx.map(function(i){return q.o[i];});
  var correctShuffledIdx=shuffledIdx.indexOf(q.a);
  return {q:q, shuffled:newOpts, correctShuffledIdx:correctShuffledIdx};
}

function render(){
  var dq=getDayQuestion();
  cQ=dq.q;cQShuffled=dq;
  var el=document.getElementById('qb');
  if(cQ.t==='mc')renderMC(el,dq);else renderDrag(el,cQ);
}

function renderMC(el,dq){
  var q=dq.q;
  var correctIdx=dq.correctShuffledIdx;
  var opts=dq.shuffled;
  var dis=atd?'disabled':'';
  var h='<div class="qhook">'+q.h+'</div><div class="qtxt">'+q.q+'</div><div class="qopts">';
  for(var i=0;i<opts.length;i++){
    var cls='qopt';
    if(atd&&savedAns>=0){
      if(i===correctIdx) cls='qopt correct';
      else if(i===savedAns&&savedAns!==correctIdx) cls='qopt wrong';
      else if(i===savedAns&&savedAns===correctIdx) cls='qopt correct';
    }
    h+='<button class="'+cls+'" '+dis+' onclick="answerMC('+i+')">'+String.fromCharCode(65+i)+') '+opts[i]+'</button>';
  }
  h+='</div><div class="qfact" id="qf" style="display:'+(atd?'block':'none')+'">💡 '+q.f+'</div>';
  h+='<button class="qnext" id="qn" style="display:'+(atd?'inline-block':'none')+'" onclick="nextQ()">Siguiente →</button>';
  el.innerHTML=h;
}

function answerMC(i){
  if(atd)return;atd=true;savedAns=i;
  var dq=cQShuffled;
  var correctIdx=dq.correctShuffledIdx;
  var btns=document.querySelectorAll('.qopt');
  for(var b=0;b<btns.length;b++)btns[b].disabled=true;

  if(i===correctIdx){
    btns[i].className='qopt correct';
    streak++;
    // Comprobar si se gana escudo (cada 20)
    var newShield=false;
    if(streak>0&&streak%10===0){shield++;newShield=true;}
    if(streak>best)best=streak;
    save(i);updUI();
    var pr=PRIZES[Math.floor(Math.random()*PRIZES.length)],f=dq.q.f;
    setTimeout(function(){showP(true,f,pr,newShield);},350);
  }else{
    if(shield>0){
      // Escudo activo: absorbe el fallo, no se pierde la racha
      shield--;
      btns[i].className='qopt shielded';
      btns[correctIdx].className='qopt correct';
      save(i);updUI();
      var f=dq.q.f;
      setTimeout(function(){showPShield(f);},350);
    }else{
      btns[i].className='qopt wrong';
      btns[correctIdx].className='qopt correct';
      var old=streak,f=dq.q.f;streak=0;save(i);updUI();
      setTimeout(function(){showP(false,f,null,old);},350);
    }
  }
  document.getElementById('qf').style.display='block';
  document.getElementById('qn').style.display='inline-block';
}

function renderDrag(el,q){
  slots=new Array(q.i.length).fill(null);
  var sh=[];for(var i=0;i<q.i.length;i++)sh.push({item:q.i[i],i:i});
  sh.sort(function(){return Math.random()-0.5;});
  var h='<div class="qhook">'+q.h+'</div><div class="qtxt">'+q.q+'</div><div class="dchips">';
  for(var c=0;c<sh.length;c++){
    var lbl=sh[c].item.length>20?sh[c].item.substring(0,18)+'…':sh[c].item;
    h+='<div class="dchip" id="chip_'+sh[c].i+'" data-txt="'+sh[c].item.replace(/"/g,'&quot;')+'" onclick="selChip('+sh[c].i+',this)">'+lbl+'</div>';
  }
  h+='</div><div class="dslots">';
  for(var s=0;s<q.i.length;s++)h+='<div class="dslot" id="slot_'+s+'" onclick="placeChip('+s+')"><span class="slot-lbl">'+(s+1)+'.</span><span id="stxt_'+s+'" style="flex:1;color:rgba(255,255,255,.4);font-size:10px">Toca aquí</span></div>';
  h+='</div><button class="qbtn" id="qbtn" onclick="checkDrag()">Comprobar</button>';
  h+='<div class="qfact" id="qf" style="display:none">💡 '+q.f+'</div>';
  h+='<button class="qnext" id="qn" style="display:none" onclick="nextQ()">Siguiente →</button>';
  el.innerHTML=h;
  if(atd){document.getElementById('qbtn').style.display='none';document.getElementById('qf').style.display='block';document.getElementById('qn').style.display='inline-block';}
}

function selChip(id,el){
  document.querySelectorAll('.dchip').forEach(function(c){c.classList.remove('selected');});
  if(!el||el.classList.contains('used'))return;
  el.classList.add('selected');selId=id;selTxt=el.getAttribute('data-txt');
}

function placeChip(si){
  if(selId===null)return;
  var prev=slots[si];slots[si]={id:selId,txt:selTxt};
  var ch=document.getElementById('chip_'+selId);
  if(ch){ch.classList.add('used');ch.classList.remove('selected');}
  if(prev!==null){var pc=document.getElementById('chip_'+prev.id);if(pc)pc.classList.remove('used');}
  var st=document.getElementById('stxt_'+si);
  if(st){st.textContent=selTxt;st.style.color='#fff';}
  var slEl=document.getElementById('slot_'+si);
  if(slEl)slEl.classList.add('filled');
  selId=null;selTxt=null;
}

function checkDrag(){
  if(atd)return;
  var q=cQ,ok=true;
  for(var si=0;si<q.o.length;si++){
    var p=slots[si],slEl=document.getElementById('slot_'+si);
    if(!p||p.id!==q.o[si]){ok=false;if(slEl)slEl.classList.add('wrong-s');}
    else if(slEl)slEl.classList.add('correct-s');
  }
  atd=true;
  document.getElementById('qbtn').style.display='none';
  document.getElementById('qf').style.display='block';
  document.getElementById('qn').style.display='inline-block';
  if(ok){
    streak++;
    var newShield=false;
    if(streak>0&&streak%10===0){shield++;newShield=true;}
    if(streak>best)best=streak;
    save();updUI();
    var pr=PRIZES[Math.floor(Math.random()*PRIZES.length)],f=cQ.f;
    setTimeout(function(){showP(true,f,pr,newShield);},400);
  }else{
    if(shield>0){
      shield--;save();updUI();var f=cQ.f;
      setTimeout(function(){showPShield(f);},400);
    }else{
      var old=streak,f=cQ.f;streak=0;save();updUI();
      setTimeout(function(){showP(false,f,null,old);},400);
    }
  }
}

function nextQ(){
  atd=false;
  // Pregunta aleatoria para el botón "Siguiente" (no la del día)
  var idx;
  do{idx=Math.floor(Math.random()*QS.length);}while(QS[idx]===cQ&&QS.length>1);
  var q=QS[idx];cQ=q;
  var el=document.getElementById('qb');
  if(q.t==='mc'){
    // Barajar con semilla aleatoria para preguntas extra
    var indices=[0,1,2,3].slice(0,q.o.length);
    var shuffledIdx=shuffleSeeded(indices,Math.floor(Math.random()*9999));
    var newOpts=shuffledIdx.map(function(i){return q.o[i];});
    var correctShuffledIdx=shuffledIdx.indexOf(q.a);
    cQShuffled={q:q,shuffled:newOpts,correctShuffledIdx:correctShuffledIdx};
    renderMC(el,cQShuffled);
  }else{
    renderDrag(el,q);
  }
}

function showP(win,fact,pr,newShield){
  if(win&&pr){
    document.getElementById('pe').textContent=pr.e;
    var title=pr.t;
    if(newShield) title='🛡️ ¡Escudo de racha conseguido!';
    document.getElementById('pt').textContent=title;
    var desc='💡 '+fact;
    if(newShield) desc='Has llegado a una racha de '+streak+'. Tienes un escudo que absorberá tu próximo fallo. 💡 '+fact;
    document.getElementById('pd').textContent=desc;
  }else{
    document.getElementById('pe').textContent='💔';
    document.getElementById('pt').textContent=lost>0?'¡Racha de '+lost+' perdida!':'¡Casi!';
    document.getElementById('pd').textContent='💡 '+fact;
  }
  document.getElementById('ov').classList.add('show');
  if(win)confetti();
}

function showPShield(fact){
  document.getElementById('pe').textContent='🛡️';
  document.getElementById('pt').textContent='¡Escudo activado!';
  document.getElementById('pd').textContent='Tu escudo ha absorbido el fallo. La racha continúa. 💡 '+fact;
  document.getElementById('ov').classList.add('show');
}

function closeP(){document.getElementById('ov').classList.remove('show');}

function confetti(){
  var box=document.getElementById('pbox'),cols=['#C4F135','#F06B6B','#fff','#1a1a1a','#FFD700'];
  for(var i=0;i<16;i++){
    var c=document.createElement('div');c.className='cf';
    c.style.cssText='left:'+(10+Math.random()*80)+'%;top:'+(Math.random()*5)+'px;width:'+(5+Math.random()*5)+'px;height:'+(5+Math.random()*5)+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';animation-delay:'+(Math.random()*.4)+'s;animation-duration:'+(1+Math.random()*.7)+'s;';
    box.appendChild(c);setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},2200);
  }
}

var layer=document.getElementById('el');
function spawnEmoji(){
  var e=document.createElement('span');e.className='ei';
  e.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  e.style.cssText='left:'+(Math.random()*94)+'%;font-size:'+(16+Math.random()*14)+'px;animation-duration:'+(8+Math.random()*8)+'s;';
  layer.appendChild(e);
  setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e);},(8+Math.random()*8)*1000);
}
for(var i=0;i<5;i++)setTimeout(spawnEmoji,i*900);
setInterval(spawnEmoji,1300);

updUI();render();
</script>



<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,700;0,900;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.bw{font-family:'Fira Sans',sans-serif;background:#F06B6B;border-radius:16px;overflow:hidden;position:relative;min-height:280px;}
.fe{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.ei{position:absolute;opacity:0.13;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(110%) rotate(0deg);opacity:0;}8%{opacity:0.13;}90%{opacity:0.13;}100%{transform:translateY(-10%) rotate(15deg);opacity:0;}}
.bc{position:relative;z-index:2;padding:24px 28px 22px;}
.mtag{display:inline-block;background:#C4F135;color:#1a1a1a;font-weight:700;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 12px;border-radius:4px;margin-bottom:10px;}
.btitle{font-weight:900;font-size:40px;color:#fff;line-height:1;margin-bottom:2px;letter-spacing:-0.01em;}
.bsub{font-size:14px;font-style:italic;color:rgba(255,255,255,0.6);margin-bottom:18px;}
.two-col{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;}
@media(max-width:580px){.two-col{grid-template-columns:1fr;}.btitle{font-size:30px;}}

.racha-block{background:rgba(0,0,0,0.16);border-radius:12px;padding:14px 16px;width:140px;text-align:center;flex-shrink:0;}
.racha-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.racha-num{font-weight:900;font-size:48px;color:#C4F135;line-height:1;transition:transform 0.3s;}
.racha-num.bump{animation:bump 0.35s ease;}
@keyframes bump{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.racha-fire{font-size:20px;margin:2px 0;}
.racha-mot{font-size:10px;color:rgba(255,255,255,0.75);font-style:italic;line-height:1.3;margin-top:6px;}
.racha-sub{font-size:9px;color:rgba(255,255,255,0.45);margin-top:4px;}
.racha-best{font-size:9px;color:rgba(196,241,53,0.7);margin-top:2px;}

.q-block{background:rgba(0,0,0,0.14);border-radius:12px;padding:14px 16px;min-height:180px;display:flex;flex-direction:column;}
.qhook{font-size:10px;font-weight:700;color:#C4F135;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.qtxt{font-size:13px;font-weight:700;color:white;line-height:1.35;margin-bottom:10px;}
.qopts{display:flex;flex-direction:column;gap:4px;flex:1;}
.qopt{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:7px;padding:5px 10px;font-size:11px;color:white;cursor:pointer;font-family:'Fira Sans',sans-serif;text-align:left;transition:background 0.15s;}
.qopt:hover:not([disabled]){background:rgba(255,255,255,0.2);}
.qopt.correct{background:rgba(196,241,53,0.28);border-color:#C4F135;font-weight:700;color:#C4F135;}
.qopt.wrong{background:rgba(255,80,80,0.28);border-color:rgba(255,100,100,0.7);color:#ffc0c0;}
.qopt[disabled]{cursor:default;}
.qfact{font-size:10px;color:rgba(255,255,255,0.65);font-style:italic;margin-top:6px;line-height:1.35;display:none;}
.qnext{background:#C4F135;color:#1a1a1a;border:none;border-radius:6px;padding:5px 12px;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin-top:8px;display:none;align-self:flex-start;}

.drag-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.dchip{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:99px;padding:3px 10px;font-size:11px;color:white;cursor:pointer;font-family:'Fira Sans',sans-serif;transition:background 0.15s;}
.dchip:hover:not(.used){background:rgba(255,255,255,0.25);}
.dchip.used{opacity:0.35;cursor:default;}
.dchip.selected{background:rgba(196,241,53,0.35);border-color:#C4F135;color:#C4F135;}
.dslots{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.dslot{background:rgba(0,0,0,0.15);border:1.5px dashed rgba(255,255,255,0.3);border-radius:7px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,0.45);min-height:26px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:border-color 0.2s;}
.dslot.filled{border-style:solid;border-color:rgba(255,255,255,0.5);color:white;}
.dslot.correct-s{border-color:#C4F135;background:rgba(196,241,53,0.15);color:#C4F135;}
.dslot.wrong-s{border-color:rgba(255,100,100,0.7);background:rgba(255,80,80,0.15);color:#ffc0c0;}
.slot-lbl{color:rgba(255,255,255,0.45);font-size:10px;flex-shrink:0;}
.qbtn{background:#C4F135;color:#1a1a1a;border:none;border-radius:6px;padding:5px 12px;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin-top:6px;align-self:flex-start;}

.prize-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:10;align-items:center;justify-content:center;border-radius:16px;}
.prize-overlay.show{display:flex;}
.prize-box{background:#C4F135;border-radius:14px;padding:22px 28px;text-align:center;max-width:300px;position:relative;}
.prize-e{font-size:40px;margin-bottom:6px;}
.prize-t{font-weight:900;font-size:19px;color:#1a1a1a;margin-bottom:4px;}
.prize-d{font-size:12px;color:#333;line-height:1.4;margin-bottom:12px;}
.prize-close{background:#1a1a1a;color:#C4F135;border:none;border-radius:7px;padding:7px 18px;font-family:'Fira Sans',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.cf{position:absolute;border-radius:2px;animation:cfall 1.2s ease-in forwards;}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(180px) rotate(400deg);opacity:0;}}
.fail-shake{animation:shake 0.4s ease;}
@keyframes shake{0%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}100%{transform:translateX(0);}}
</style>

<div class="bw" id="banner">
  <div class="fe" id="emojiLayer"></div>
  <div class="bc">
    <div class="mtag">AC1A · FP Comercio</div>
    <div class="btitle">Técnicas de almacén</div>
    <div class="bsub">de estudiante a profesional</div>
    <div class="two-col">
      <div class="racha-block">
        <div class="racha-label">Racha sin fallos</div>
        <div class="racha-num" id="rachaNum">0</div>
        <div class="racha-fire" id="rachaFire">⚡</div>
        <div class="racha-mot" id="rachaMot">¡Empieza hoy!</div>
        <div class="racha-sub" id="rachaSub"></div>
        <div class="racha-best" id="rachaBest"></div>
      </div>
      <div class="q-block" id="qBlock"></div>
    </div>
  </div>
  <div class="prize-overlay" id="prizeOverlay">
    <div class="prize-box" id="prizeBox">
      <div class="prize-e" id="prizeE">🏆</div>
      <div class="prize-t" id="prizeT">¡Correcto!</div>
      <div class="prize-d" id="prizeD"></div>
      <button class="prize-close" onclick="closePrize()">Seguir →</button>
    </div>
  </div>
</div>

<script>
const QS = [
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué significa FIFO en gestión de almacén?',opts:['First In First Out','Fast Inventory Flow Order','Full Item Final Output','Fixed Index For Orders'],ans:0,fact:'Significa que lo primero que entra es lo primero que sale. Esencial en productos con caducidad.'},
  {type:'mc',hook:'¿Cuál crees que es...', q:'¿Cuál es la unidad de medida de los contenedores marítimos?',opts:['TEU (Twenty-foot Equivalent Unit)','CEU (Container Equivalent Unit)','PEU (Port Entry Unit)','MEU (Maritime Export Unit)'],ans:0,fact:'Hay más de 800 millones de movimientos TEU anuales en todo el mundo.'},
  {type:'mc',hook:'¡Adivina si puedes!', q:'¿Qué porcentaje del precio final puede representar el coste logístico?',opts:['Entre el 5% y el 15%','Menos del 1%','Siempre exactamente el 20%','Entre el 50% y el 70%'],ans:0,fact:'En alimentación fresca puede llegar hasta el 25-30% del precio final.'},
  {type:'mc',hook:'¿Sabías que...', q:'Los primeros 3 dígitos del código EAN-13 identifican:',opts:['El país del fabricante','El precio del producto','La fecha de fabricación','La categoría del artículo'],ans:0,fact:'España usa el prefijo 84. Puedes saber el origen de cualquier producto mirando el EAN.'},
  {type:'mc',hook:'¿Te lo imaginas?', q:'¿Cuántos km puede caminar al día un operario en un almacén grande?',opts:['Entre 15 y 25 km','Menos de 3 km','Entre 5 y 8 km','Más de 50 km'],ans:0,fact:'Por eso el diseño de rutas de picking es crucial para reducir fatiga y tiempo.'},
  {type:'mc',hook:'¡Pon a prueba tu criterio!', q:'¿Qué es el "efecto látigo" en logística?',opts:['Amplificación de variaciones de demanda hacia atrás en la cadena','Un tipo de transporte especial','Oscilación de precios en Bolsa','Fallo mecánico en carretillas elevadoras'],ans:0,fact:'Una pequeña variación en la demanda final puede multiplicarse x10 en los proveedores.'},
  {type:'mc',hook:'¿Cuántos caben? ¡Sorpréndete!', q:'¿Cuántos palets EUR caben en un camión tráiler de 13,6 m?',opts:['33 palets','20 palets','50 palets','15 palets'],ans:0,fact:'El palet europeo (1200x800mm) está diseñado exactamente para optimizar este espacio.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué es un almacén "caótico"?',opts:['Mercancía sin ubicación fija, gestionada por software','Un almacén sin gestión visible','Un almacén de residuos industriales','Un almacén en obras'],ans:0,fact:'Es altamente eficiente: el software sabe siempre dónde está cada artículo aunque cambie de ubicación.'},
  {type:'mc',hook:'¡Decide como un profesional!', q:'¿Qué sistema de picking tiene menor tasa de error?',opts:['Picking por voz','Picking en papel','Picking por memoria','Picking por SMS'],ans:0,fact:'El picking por voz puede alcanzar 99,9% de precisión y libera las manos del operario.'},
  {type:'mc',hook:'¿Lo sabías?', q:'El cross-docking elimina casi el almacenamiento. ¿Quién lo usa más?',opts:['Supermercados y distribución de alimentación','Librerías y papelerías','Ferreterías industriales','Tiendas de artículos de lujo'],ans:0,fact:'Mercadona y Lidl son referentes en cross-docking para mercancía fresca en España.'},
  {type:'mc',hook:'¿Cuál crees que...', q:'¿Qué significa SKU en gestión de almacén?',opts:['Stock Keeping Unit','Stock Kilómetro Útil','Sistema de Kardex Universal','Servicio de Kitting Unificado'],ans:0,fact:'Cada variante de producto (talla, color, modelo) tiene su propio SKU único en el sistema.'},
  {type:'mc',hook:'¡Sorpréndete!', q:'Amazon tiene más de 750.000 robots en sus almacenes. ¿Cómo se llaman?',opts:['Amazon Robotics (antes Kiva)','RoboAmazon','FulfillBot','LogiDroid'],ans:0,fact:'Amazon adquirió Kiva Systems en 2012 por 775 millones de dólares solo por su tecnología robótica.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué norma regula el transporte de mercancías peligrosas por carretera?',opts:['ADR','IATA','CMR','FIATA'],ans:0,fact:'El ADR es el Acuerdo Europeo sobre Transporte Internacional de Mercancías Peligrosas por Carretera.'},
  {type:'mc',hook:'¿Qué harías tú?', q:'Una mercancía llega dañada al almacén. Lo primero que debes hacer es:',opts:['Anotar reserva en el albarán y fotografiar el daño','Aceptarla y reclamar después','Rechazarla sin documentar','Llamar al jefe antes de hacer nada'],ans:0,fact:'Sin reserva en el albarán, es muy difícil reclamar al transportista después.'},
  {type:'mc',hook:'¡Decide!', q:'¿Qué modelo de inventario usa cantidad fija de pedido?',opts:['Modelo Q (punto de pedido fijo)','Modelo P (revisión periódica)','Modelo LIFO','Modelo ABC'],ans:0,fact:'El modelo Q lanza un pedido siempre de la misma cantidad cuando el stock baja del punto de pedido.'},
  {type:'mc',hook:'¿Sabías que...', q:'El método ABC de gestión de stocks clasifica los artículos por:',opts:['Valor económico que representan','Peso y volumen','Fecha de caducidad','Proveedor de origen'],ans:0,fact:'El 20% de los artículos (tipo A) suele representar el 80% del valor total del inventario.'},
  {type:'mc',hook:'¿Cuál crees?', q:'¿Qué es el stock de seguridad?',opts:['Reserva para cubrir variaciones de demanda o retraso de entregas','El stock mínimo legal obligatorio','El inventario físico anual','El stock que se guarda para inspecciones'],ans:0,fact:'Sin stock de seguridad, cualquier retraso del proveedor puede paralizar las ventas o la producción.'},
  {type:'mc',hook:'¡Ponlo a prueba!', q:'¿Qué EPI es obligatorio en zonas de trabajo con carretillas elevadoras?',opts:['Calzado de seguridad y casco','Solo guantes','Solo chaleco reflectante','Ninguno si hay señalización'],ans:0,fact:'La normativa PRL exige calzado de seguridad y casco en zonas con riesgo de caída de objetos.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué es un WMS?',opts:['Warehouse Management System (sistema de gestión de almacén)','Wireless Merchandise Scanner','Weekly Management Summary','Work Machine Station'],ans:0,fact:'Un WMS controla ubicaciones, movimientos, picking y expedición en tiempo real.'},
  {type:'mc',hook:'¡Dato curioso!', q:'¿Cuál es la temperatura de almacenamiento de los productos ultracongelados?',opts:['-18°C o inferior','-5°C','+2°C a +5°C','0°C exacto'],ans:0,fact:'Por ley, los productos ultracongelados deben mantenerse a -18°C o menos durante toda la cadena de frío.'},
  {type:'mc',hook:'¿Cuál crees que...', q:'¿Qué tipo de estantería se usa para palets en almacenes convencionales?',opts:['Estantería paletizada (rack selectivo)','Estantería cantilever','Estantería de archivo','Mezzanine'],ans:0,fact:'El rack selectivo da acceso directo a cada palet y es el más usado en almacenes generalistas.'},
  {type:'mc',hook:'¿Lo sabías?', q:'¿Qué significa "punto de pedido" en gestión de stocks?',opts:['Nivel de stock que activa un nuevo pedido','El precio mínimo de compra','La cantidad máxima almacenable','El plazo de entrega del proveedor'],ans:0,fact:'El punto de pedido se calcula teniendo en cuenta el consumo medio y el plazo de entrega.'},
  {type:'mc',hook:'¡Decide como un jefe de almacén!', q:'¿Qué documento acredita la entrega de mercancía entre transportista y destinatario?',opts:['Albarán de entrega','Factura proforma','Nota de cargo','Pedido de compra'],ans:0,fact:'El albarán firmado es la prueba legal de que la mercancía fue recibida en las condiciones pactadas.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué significa LIFO en valoración de existencias?',opts:['Last In First Out','Last Item For Order','Low Inventory Fixed Output','Logistics Index For Operations'],ans:0,fact:'LIFO valora el stock como si lo último que entró fuera lo primero en salir. Ya no está permitido en España según el PGC.'},
  {type:'mc',hook:'¿Cuál es más eficiente?', q:'¿Qué layout de almacén facilita más el flujo de mercancías?',opts:['Flujo en línea recta (entrada-salida opuestas)','Flujo en U (entrada-salida juntas)','Flujo en zigzag','Flujo circular'],ans:0,fact:'El flujo en línea recta es ideal para cross-docking. El flujo en U es más habitual en almacenes polivalentes.'},
  {type:'mc',hook:'¡Dato que no esperabas!', q:'¿Cuánto puede pesar como máximo una carga manual sin ayuda mecánica según el INSST?',opts:['25 kg en condiciones óptimas','50 kg','10 kg','No hay límite legal'],ans:0,fact:'Para mujeres embarazadas o jóvenes el límite baja a 10-15 kg. La clave es la postura y la frecuencia.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué es el "picking por oleadas"?',opts:['Agrupar pedidos por zonas o turnos para optimizar rutas','Hacer picking con agua en zonas refrigeradas','Seleccionar productos de alta rotación primero','Recoger artículos siguiendo el orden del EAN'],ans:0,fact:'Las oleadas reducen los km recorridos y permiten preparar muchos pedidos simultáneamente.'},
  {type:'mc',hook:'¿Cuál crees?', q:'¿Qué color de señal indica PROHIBICIÓN en seguridad laboral?',opts:['Rojo y blanco','Amarillo y negro','Verde y blanco','Azul y blanco'],ans:0,fact:'Rojo = prohibición o peligro. Amarillo = advertencia. Verde = evacuación o primeros auxilios. Azul = obligación.'},
  {type:'mc',hook:'¡Ponlo a prueba!', q:'En un inventario, ¿qué es la "diferencia de inventario"?',opts:['Diferencia entre stock teórico y stock real','El tiempo entre dos inventarios','El coste de hacer el recuento','El número de referencias contadas'],ans:0,fact:'Las mermas, robos y errores de registro son las principales causas de diferencias de inventario.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué es el "lote económico de pedido" (EOQ)?',opts:['Cantidad óptima que minimiza costes de pedido y almacenamiento','El lote mínimo que acepta el proveedor','La cantidad máxima que cabe en el almacén','El pedido urgente de emergencia'],ans:0,fact:'La fórmula EOQ fue desarrollada por Ford Harris en 1913. Sigue siendo la base de muchos sistemas de reposición.'},
  {type:'mc',hook:'¡Decide!', q:'¿Qué tipo de carretilla se usa para mover palets en pasillos estrechos?',opts:['Carretilla retráctil o tridireccional','Carretilla frontal estándar','Transpaleta manual','Apilador eléctrico de pie'],ans:0,fact:'Las carretillas trilaterales pueden trabajar en pasillos de tan solo 1,6 m de ancho.'},
  {type:'mc',hook:'¿Cuál crees que...', q:'¿Qué es el "plazo de entrega" o lead time en logística?',opts:['Tiempo desde que se hace el pedido hasta que llega al almacén','El plazo de pago al proveedor','El tiempo de descarga de un camión','El plazo de garantía del producto'],ans:0,fact:'Un lead time largo obliga a tener más stock de seguridad para no quedarse sin existencias.'},
  {type:'mc',hook:'¿Lo sabías?', q:'¿Qué es la trazabilidad de un producto?',opts:['Seguimiento del producto a lo largo de toda la cadena de suministro','El peso total de una remesa','La ruta del camión de reparto','El número de albaranes generados'],ans:0,fact:'La trazabilidad es obligatoria en alimentación desde el Reglamento CE 178/2002 para garantizar la seguridad alimentaria.'},
  {type:'mc',hook:'¡Sorpréndete!', q:'¿Cuántos tipos de señales de seguridad existen según la normativa española?',opts:['4 tipos (prohibición, advertencia, obligación, emergencia)','2 tipos (peligro y seguridad)','6 tipos','Solo 1 tipo normalizado'],ans:0,fact:'Cada color tiene un significado específico regulado por el RD 485/1997 sobre señalización de seguridad.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué es el "embalaje secundario" de un producto?',opts:['El que agrupa varias unidades de venta (caja, bandeja)','El envase que toca directamente el producto','El plástico de paletización','El contenedor de transporte marítimo'],ans:0,fact:'El embalaje primario toca el producto, el secundario lo agrupa y el terciario lo prepara para transporte.'},
  {type:'mc',hook:'¿Cuál elegirías?', q:'Para almacenar productos con mucha rotación (tipo A), ¿dónde los ubicarías?',opts:['Cerca de las zonas de picking y expedición','Al fondo del almacén para seguridad','En las zonas más altas de las estanterías','Junto a la zona de carga/descarga principal'],ans:0,fact:'Reducir los desplazamientos de los productos más movidos puede ahorrar hasta un 30% del tiempo de operación.'},
  {type:'mc',hook:'¡Dato curioso!', q:'¿Qué es el "picking por voz" o voice picking?',opts:['Sistema que guía al operario mediante instrucciones de audio','Una app para hablar con el proveedor','Un sistema de grabación de incidencias','Una técnica de negociación con clientes'],ans:0,fact:'Se puede combinar con gafas de realidad aumentada (pick-to-light + voice) para maximizar la precisión.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué es el "despacho de aduana"?',opts:['Trámite para que la mercancía pueda entrar o salir de un territorio aduanero','La zona de descarga de un aeropuerto','El impuesto sobre importaciones','El permiso para transportar mercancía peligrosa'],ans:0,fact:'Sin despacho aduanero, la mercancía no puede circular legalmente entre países con distintos regímenes fiscales.'},
  {type:'mc',hook:'¡Ponlo a prueba!', q:'En expedición, ¿qué es la "hoja de ruta"?',opts:['Documento con las paradas y entregas que hará el transporte','El mapa del almacén','El plan de formación del personal','El registro de incidencias del día'],ans:0,fact:'La hoja de ruta optimizada reduce kilómetros, tiempo y costes de combustible del transportista.'},
  {type:'mc',hook:'¿Cuál crees?', q:'¿Qué es el "merma" en gestión de almacén?',opts:['Pérdida de existencias por rotura, caducidad o robo','El exceso de stock sin vender','El descuento por volumen de compra','La diferencia entre precio de compra y venta'],ans:0,fact:'Las mermas pueden representar entre el 1% y el 3% de las ventas en supermercados.'},
  {type:'mc',hook:'¿Sabías que...', q:'¿Qué normativa regula la prevención de riesgos laborales en España?',opts:['Ley 31/1995 de PRL','RD 1627/1997','Ley 16/1987 de transportes','ISO 9001:2015'],ans:0,fact:'La Ley de PRL obliga a evaluar y controlar todos los riesgos del puesto de trabajo, incluidos los ergonómicos.'},
  {type:'mc',hook:'¡Decide como un profesional!', q:'¿Qué es el "SGA" o WMS?',opts:['Sistema de Gestión de Almacenes','Sistema de Gestión Administrativa','Software de Gestión de Agencias','Servicio de Gestión Automatizada'],ans:0,fact:'Un SGA moderno puede gestionar en tiempo real millones de movimientos diarios con mínimo error humano.'},
  {type:'mc',hook:'¿Lo sabías?', q:'¿Cuál es el objetivo principal del "inventario rotativo"?',opts:['Contar partes del almacén de forma continua sin parar la operativa','Hacer un recuento total una vez al año','Inventariar solo los productos tipo A','Contar el stock los fines de semana'],ans:0,fact:'El inventario rotativo permite detectar errores antes de que se acumulen y afecten a los pedidos.'},
  {type:'mc',hook:'¿Cuál crees que...', q:'¿Qué significa "paletización" en logística?',opts:['Colocación y fijación de mercancía sobre un palet para facilitar su manipulación','Fabricar palets de madera','Clasificar la mercancía por peso','Etiquetar productos con código de barras'],ans:0,fact:'Una buena paletización reduce daños, optimiza espacio y agiliza la descarga hasta un 40%.'},
  {type:'mc',hook:'¡Dato que no esperabas!', q:'¿Qué es el "packing list"?',opts:['Lista detallada del contenido de un envío o expedición','El plano de disposición del almacén','El listado de precios del proveedor','El plan de embalaje anual'],ans:0,fact:'El packing list es imprescindible en comercio internacional para el despacho aduanero.'},

function getToday(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function getDayIndex(){ const s=new Date(2024,8,1); const n=new Date(); return Math.floor((n-s)/(86400000)); }

let streak = 0, best = 0, lastDate = '', answeredToday = false;
try {
  streak = parseInt(localStorage.getItem('alm_streak')||'0');
  best = parseInt(localStorage.getItem('alm_best')||'0');
  lastDate = localStorage.getItem('alm_lastdate')||'';
  answeredToday = localStorage.getItem('alm_answered_today') === getToday();
} catch(e){}

function saveStreak(){
  try {
    localStorage.setItem('alm_streak', streak);
    localStorage.setItem('alm_best', best);
    localStorage.setItem('alm_lastdate', lastDate);
    localStorage.setItem('alm_answered_today', getToday());
  } catch(e){}
}

function getMot(n){
  let msg = MOTS[0][1];
  for(const [th,m] of MOTS){ if(n>=th) msg=m; }
  return msg;
}
function getFire(n){
  if(n===0) return '⚡';
  if(n<3) return '🔥';
  if(n<7) return '💥';
  if(n<10) return '🌟';
  if(n<15) return '🏆';
  return '👑';
}

function updateRachaUI(){
  const rn = document.getElementById('rachaNum');
  rn.textContent = streak;
  rn.classList.remove('bump'); void rn.offsetWidth; rn.classList.add('bump');
  document.getElementById('rachaFire').textContent = getFire(streak);
  document.getElementById('rachaMot').textContent = getMot(streak);
  document.getElementById('rachaSub').textContent = lastDate ? 'Última: '+lastDate : '';
  document.getElementById('rachaBest').textContent = best>0 ? '🏅 Récord: '+best : '';
}

let currentQ = null, dragSelected = null, slotState = [];

function getQuestion(){
  const idx = getDayIndex() % QS.length;
  return QS[idx];
}

function renderQuestion(){
  const q = getQuestion();
  currentQ = q;
  const el = document.getElementById('qBlock');
  if(q.type === 'mc') renderMC(el, q);
  else if(q.type === 'drag') renderDrag(el, q);
}

function renderMC(el, q){
  const disabled = answeredToday ? 'disabled' : '';
  el.innerHTML = `
    <div class="qhook">${q.hook}</div>
    <div class="qtxt">${q.q}</div>
    <div class="qopts" id="opts">
      ${q.opts.map((o,i)=>`<button class="qopt" ${disabled} onclick="answerMC(${i})">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}
    </div>
    <div class="qfact" id="qfact">💡 ${q.fact}</div>
    <button class="qnext" id="qnext" onclick="nextQ()">Siguiente pregunta →</button>
  `;
  if(answeredToday){
    document.getElementById('qfact').style.display='block';
    document.getElementById('qnext').style.display='block';
  }
}

function answerMC(i){
  if(answeredToday) return;
  answeredToday = true;
  const q = currentQ;
  const btns = document.querySelectorAll('.qopt');
  btns.forEach(b=>b.disabled=true);
  if(i===q.ans){
    btns[i].classList.add('correct');
    streak++; if(streak>best) best=streak;
    lastDate = getToday();
    saveStreak();
    updateRachaUI();
    setTimeout(()=>showPrize(true, q.fact),350);
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    const old = streak; streak=0; saveStreak(); updateRachaUI();
    if(old>0) setTimeout(()=>showPrize(false, q.fact, old),350);
    else { document.getElementById('qfact').style.display='block'; document.getElementById('qnext').style.display='block'; }
  }
  document.getElementById('qfact').style.display='block';
  document.getElementById('qnext').style.display='block';
}

function renderDrag(el, q){
  const shuffled = [...q.items].map((item,i)=>({item,i})).sort(()=>Math.random()-0.5);
  slotState = new Array(q.items.length).fill(null);
  el.innerHTML = `
    <div class="qhook">${q.hook}</div>
    <div class="qtxt">${q.q}</div>
    <div class="drag-chips" id="dchips">
      ${shuffled.map((s,ci)=>`<div class="dchip" id="chip_${s.i}" onclick="selectChip(${s.i},'${s.item.replace(/'/g,"\\'")}',this)">${s.item}</div>`).join('')}
    </div>
    <div class="dslots" id="dslots">
      ${q.items.map((_,si)=>`<div class="dslot" id="slot_${si}" onclick="placeChip(${si})"><span class="slot-lbl">${si+1}.</span><span id="slot_txt_${si}" style="flex:1;font-size:11px;color:rgba(255,255,255,0.5)">Toca aquí</span></div>`).join('')}
    </div>
    <button class="qbtn" id="qbtn" onclick="checkDrag()">Comprobar</button>
    <div class="qfact" id="qfact" style="display:none">💡 ${q.fact}</div>
    <button class="qnext" id="qnext" style="display:none" onclick="nextQ()">Siguiente →</button>
  `;
  if(answeredToday){ document.getElementById('qbtn').style.display='none'; document.getElementById('qfact').style.display='block'; document.getElementById('qnext').style.display='block'; }
}

let selectedChipId = null, selectedChipTxt = null;
function selectChip(id, txt, el){
  if(el.classList.contains('used')) return;
  document.querySelectorAll('.dchip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedChipId = id; selectedChipTxt = txt;
}
function placeChip(si){
  if(selectedChipId===null) return;
  const prev = slotState[si];
  slotState[si] = {id:selectedChipId, txt:selectedChipTxt};
  const chip = document.getElementById('chip_'+selectedChipId);
  if(chip){ chip.classList.add('used'); chip.classList.remove('selected'); }
  if(prev!==null){ const pc=document.getElementById('chip_'+prev.id); if(pc){pc.classList.remove('used');} }
  const sl = document.getElementById('slot_txt_'+si);
  if(sl){ sl.textContent=selectedChipTxt; sl.style.color='white'; }
  const slotEl = document.getElementById('slot_'+si);
  if(slotEl) slotEl.classList.add('filled');
  selectedChipId=null; selectedChipTxt=null;
}
function checkDrag(){
  if(answeredToday) return;
  const q = currentQ;
  let correct = true;
  q.order.forEach((correctChipIdx, si)=>{
    const placed = slotState[si];
    const slotEl = document.getElementById('slot_'+si);
    if(!placed || placed.id !== correctChipIdx){ correct=false; if(slotEl) slotEl.classList.add('wrong-s'); }
    else { if(slotEl) slotEl.classList.add('correct-s'); }
  });
  answeredToday=true;
  document.getElementById('qbtn').style.display='none';
  document.getElementById('qfact').style.display='block';
  document.getElementById('qnext').style.display='block';
  if(correct){
    streak++; if(streak>best) best=streak;
    lastDate=getToday(); saveStreak(); updateRachaUI();
    setTimeout(()=>showPrize(true, q.fact),400);
  } else {
    const old=streak; streak=0; saveStreak(); updateRachaUI();
    if(old>0) setTimeout(()=>showPrize(false,q.fact,old),400);
  }
}

function nextQ(){
  answeredToday = false;
  const qs = [...QS];
  let idx;
  do { idx = Math.floor(Math.random()*qs.length); } while(qs[idx]===currentQ && qs.length>1);
  currentQ = qs[idx];
  const el = document.getElementById('qBlock');
  if(currentQ.type==='mc') renderMC(el,currentQ);
  else renderDrag(el,currentQ);
}

function showPrize(win, fact, lostStreak){
  const p = PRIZES[Math.floor(Math.random()*PRIZES.length)];
  const overlay = document.getElementById('prizeOverlay');
  if(win){
    document.getElementById('prizeE').textContent = p.e;
    document.getElementById('prizeT').textContent = p.t;
    document.getElementById('prizeD').textContent = '💡 '+fact;
  } else {
    document.getElementById('prizeE').textContent = '💔';
    document.getElementById('prizeT').textContent = lostStreak>0 ? '¡Racha de '+lostStreak+' perdida!' : '¡Casi!';
    document.getElementById('prizeD').textContent = 'Respuesta incorrecta. Racha reiniciada a 0. 💡 '+fact;
  }
  overlay.classList.add('show');
  if(win) spawnConfetti();
}
function closePrize(){ document.getElementById('prizeOverlay').classList.remove('show'); }

function spawnConfetti(){
  const box = document.getElementById('prizeBox');
  const colors=['#C4F135','#F06B6B','#fff','#1a1a1a','#FFD700'];
  for(let i=0;i<18;i++){
    const c=document.createElement('div');
    c.className='cf';
    c.style.cssText=`left:${10+Math.random()*80}%;top:${-5+Math.random()*20}px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.4}s;animation-duration:${1+Math.random()*0.8}s;`;
    box.appendChild(c);
    setTimeout(()=>c.remove(),2500);
  }
}

const layer = document.getElementById('emojiLayer');
function spawnEmoji(){
  const el=document.createElement('div'); el.className='ei';
  el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  el.style.left=Math.random()*95+'%';
  el.style.fontSize=(18+Math.random()*16)+'px';
  const dur=8+Math.random()*8; el.style.animationDuration=dur+'s';
  layer.appendChild(el); setTimeout(()=>el.remove(),dur*1000);
}
for(let i=0;i<6;i++) setTimeout(spawnEmoji,i*1000);
setInterval(spawnEmoji,1200);

updateRachaUI();
renderQuestion();
</script>
